<!-- @dsCard name="Login Page" group="Patterns" subtitle="로그인 화면 전체 조합" viewport="480x640" -->
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f9fafb;color:#111827;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;-webkit-font-smoothing:antialiased}
.box{width:100%;max-width:384px}
h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:4px}
.sub{font-size:14px;color:#6b7280;text-align:center;margin-bottom:32px}
form{background:#fff;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.05);padding:24px;display:flex;flex-direction:column;gap:16px}
label{font-size:14px;font-weight:500;color:#374151;display:block;margin-bottom:6px}
input[type=text],input[type=password]{width:100%;font-family:inherit;font-size:14px;padding:10px 16px;border:1px solid #d1d5db;border-radius:8px;outline:none}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.4)}
.check{display:flex;align-items:center;gap:8px;cursor:pointer}
.check input{width:16px;height:16px;accent-color:#2563eb}
.check span{font-size:14px;color:#4b5563}
button{font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
button:hover{background:#1d4ed8}
.foot{text-align:center;font-size:12px;color:#9ca3af;margin-top:24px}
</style>
<div class="box">
  <h1>QuoteMaker</h1>
  <p class="sub">하나플랫폼 견적서 자동화 시스템</p>
  <form>
    <div><label>아이디</label><input type="text" placeholder="아이디를 입력하세요"></div>
    <div><label>비밀번호</label><input type="password" placeholder="비밀번호를 입력하세요"></div>
    <label class="check"><input type="checkbox" checked><span>아이디 저장</span></label>
    <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5m5 5H3"/></svg>로그인</button>
  </form>
  <p class="foot">© 2026 (주)하나플랫폼</p>
</div>
